name: Deploy to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-to-cloudrun.yml'
  workflow_dispatch:  # Allow manual triggering

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: data-observability-api

jobs:
  deploy:
    name: Deploy API to Cloud Run
    runs-on: ubuntu-latest

    # Add "id-token" with the intended permissions for workload identity federation
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify API Directory
        run: |
          if [ ! -f "./api/main.py" ]; then
            echo "❌ Error: api/main.py not found!"
            echo "Current directory: $(pwd)"
            echo "Contents:"
            ls -la
            exit 1
          fi
          echo "✅ API directory verified"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --source ./api \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars "\
          DATABASE_URL=${{ secrets.DATABASE_URL }},\
          JWT_SECRET=${{ secrets.JWT_SECRET }},\
          JWT_EXPIRY_HOURS=${{ secrets.JWT_EXPIRY_HOURS }},\
          EMAIL_BACKEND=${{ secrets.EMAIL_BACKEND }},\
          GMAIL_CLIENT_ID=${{ secrets.GMAIL_CLIENT_ID }},\
          GMAIL_CLIENT_SECRET=${{ secrets.GMAIL_CLIENT_SECRET }},\
          GMAIL_REFRESH_TOKEN=${{ secrets.GMAIL_REFRESH_TOKEN }},\
          EMAIL_FROM=${{ secrets.EMAIL_FROM }},\
          API_BASE_URL=${{ secrets.API_BASE_URL }},\
          DASHBOARD_URL=${{ secrets.DASHBOARD_URL }}" \
            --memory 512Mi \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300 \
            --cpu 1 \
            --platform managed

      - name: Get Service URL
        id: get-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Service URL: $URL"

      - name: Verify Deployment
        run: |
          curl -f ${{ steps.get-url.outputs.url }}/health || exit 1
          echo "✅ Deployment verified - health check passed"

      - name: Deployment Summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ env.SERVICE_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** ${{ env.REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** ${{ steps.get-url.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "- Test API: \`curl ${{ steps.get-url.outputs.url }}/health\`" >> $GITHUB_STEP_SUMMARY
          echo "- Update frontend environment variables if needed" >> $GITHUB_STEP_SUMMARY
